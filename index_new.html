<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi Cours</title>
    <link rel="manifest" href="/suivi-cours/manifest.json" />
    <link rel="apple-touch-icon" href="/suivi-cours/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Suivi Cours" />
    <meta name="theme-color" content="#1A1A2E" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/suivi-cours/sw.js')
            .then(r => console.log('SW OK', r.scope))
            .catch(e => console.error('SW KO', e));
        });
      }
    </script>
  </body>
</html>
